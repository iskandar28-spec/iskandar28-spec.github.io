<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dar Website</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
    overflow-x: hidden;
}

/* background animasi */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.bg span {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #00ffcc;
    border-radius: 50%;
    animation: naik 12s linear infinite;
}

@keyframes naik {
    0% {transform: translateY(100vh); opacity: 1;}
    100% {transform: translateY(-10vh); opacity: 0;}
}

/* hero */
.hero {
    text-align: center;
    padding: 100px 20px;
    animation: fade 2s ease;
}

.hero h1 {
    font-size: 40px;
    color: #00ffcc;
}

.hero p {
    margin-top: 10px;
    opacity: 0.8;
}

/* box */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

.card {
    width: 250px;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
    animation: fadeUp 1.5s ease;
}

.card:hover {
    transform: scale(1.05);
    background: rgba(0,255,204,0.1);
}

.card h3 {
    color: #00ffcc;
}

.card p {
    font-size: 14px;
    margin-top: 10px;
}

/* animasi */
@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* tombol */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 15px;
    border-radius: 10px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    font-size: 14px;
}

/* footer */
.footer {
    text-align: center;
    padding: 30px;
    opacity: 0.6;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- background -->
<div class="bg" id="bg"></div>

<!-- hero -->
<div class="hero">
    <h1>Halo 👋</h1>
    <p>Website aesthetic pertama saya</p>
</div>

<!-- konten -->
<div class="container">

    <div class="card">
        <h3>🎬 Konten POV</h3>
        <p>Bikin konten bareng pasangan / teman dengan konsep aesthetic & story</p>
    </div>

    <div class="card">
        <h3>🔥 Project</h3>
        <p>Upload video, ide konten, dan perjalanan kreatif kamu</p>
    </div>

    <div class="card">
        <h3>📱 Sosial Media</h3>
        <p>Follow untuk konten terbaru</p>
        <a href="https://instagram.com/_iskandaryouth" class="btn" target="_blank">Instagram</a>
    </div>

</div>

<!-- footer -->
<div class="footer">
    © 2026 Dar Website
</div>

<script>
/* bikin partikel random */
const bg = document.getElementById("bg");

for(let i=0; i<25; i++){
    let span = document.createElement("span");
    span.style.left = Math.random() * 100 + "%";
    span.style.animationDuration = (5 + Math.random() * 10) + "s";
    span.style.width = span.style.height = (5 + Math.random() * 5) + "px";
    bg.appendChild(span);
}
</script>

</body>
</html>
